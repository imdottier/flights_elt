x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: airflow.Dockerfile
  env_file:
    - .env
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_DB_USER}:${POSTGRES_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_DB_USER}:${POSTGRES_DB_PASSWORD}@postgres/${AIRFLOW_DB_NAME}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    # AIRFLOW__CORE__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    # AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    AIRFLOW__CORE__INTERNAL_API_URL: http://airflow-apiserver:8080
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
  
    # AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    # AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    # AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'

    AIRFLOW__API_AUTH__JWT_SECRET: "${AIRFLOW_SECRET_KEY}"
    DBT_HOST: postgres
    HOME: /home/airflow
    PYTHONPATH: /app
  volumes:
    - .:/app
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./dbt_flights:/app/dbt_flights
    # - spark-warehouse:/app/spark-warehouse
    - ${HOME}/.dbt:/home/airflow/.dbt

    # For Spark
    - ./conf/log4j2.properties:/opt/spark/conf/log4j2.properties
    - ./conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    - spark-events:/opt/spark/spark-events
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy
  networks:
    - default
    - spark-network


x-spark-common: &spark-common
  build:
    context: .
    dockerfile: spark.Dockerfile
  user: "root"
  restart: unless-stopped
  volumes:
    - .:/app
    - ./conf/log4j2.properties:/opt/spark/conf/log4j2.properties
    - ./conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    - spark-events:/opt/spark/spark-events # The magical shared log folder!
  networks:
    - default
    - spark-network
  environment: &spark-common-env
    # Python
    PYTHONPATH: /app
    PYSPARK_PYTHON: python3
    PYSPARK_DRIVER_PYTHON: python3
    
    # MinIO / S3 Setup
    AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
    AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    AWS_REGION: us-east-1

# Spark-enabled Airflow variant (only build where needed)
x-airflow-spark:
  &airflow-spark
  <<: *airflow-common
  build:
    context: .
    dockerfile: airflow-spark.Dockerfile
  environment:
    <<: [*airflow-common-env, *spark-common-env]


services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: ${PROJECT_NAME}-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:    
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - default
      - spark-network

  minio-init:
    image: minio/mc:latest
    container_name: ${PROJECT_NAME}-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - default
      - spark-network
    entrypoint: >
      bash -c "
        sleep 5 && 
        mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} && 
        mc mb --ignore-existing myminio/data && 
        echo 'MinIO bucket "data" created successfully'
      "

  # hive-metastore-v2:
  #   build:
  #     context: .
  #     dockerfile: hive.Dockerfile
  #   container_name: ${PROJECT_NAME}-hive-metastore-v2
  #   restart: unless-stopped
  #   depends_on:
  #     create-dbs:
  #       condition: service_completed_successfully
  #     minio:
  #       condition: service_healthy
  #   environment:
  #     - SERVICE_NAME=metastore
  #     - DB_DRIVER=postgres
  #     # Hive 3.1.3 uses these standard vars for S3A
  #     - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
  #     - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
  #     # This is the standard Hive 3 way to pass DB credentials
  #     - SERVICE_OPTS=-Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/${SPARK_METASTORE_DB_NAME} -Djavax.jdo.option.ConnectionUserName=${POSTGRES_DB_USER} -Djavax.jdo.option.ConnectionPassword=${POSTGRES_DB_PASSWORD}
  #   ports:
  #     - "9083:9083"
  #   networks:
  #     - default
  #     - spark-network
  #   volumes:
  #     # We mount our pre-configured hive-site.xml directly
  #     - ./conf/hive-site.xml:/opt/hive/conf/hive-site.xml:ro

  hive-metastore:
    build:
      context: .
      dockerfile: hive.Dockerfile
    container_name: ${PROJECT_NAME}-hive-metastore
    restart: unless-stopped
    depends_on:
      create-dbs:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      - SERVICE_NAME=metastore
      - DB_DRIVER=postgres
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_REGION=us-east-1
      - S3_ENDPOINT_URL=http://minio:9000
      - HADOOP_CLASSPATH=/opt/hive/lib/hadoop-aws-3.3.6.jar:/opt/hive/lib/aws-java-sdk-bundle-1.12.367.jar
      - SERVICE_OPTS=
          -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
          -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/${SPARK_METASTORE_DB_NAME}
          -Djavax.jdo.option.ConnectionUserName=${POSTGRES_DB_USER}
          -Djavax.jdo.option.ConnectionPassword=${POSTGRES_DB_PASSWORD}
          -Dhive.metastore.authorization.storage.checks=false
          -Dmetastore.authorization.storage.checks=false
          -Dfs.s3a.endpoint=http://minio:9000
          -Dfs.s3a.path.style.access=true
          -Dfs.s3a.connection.ssl.enabled=false
          -Dfs.s3a.access.key=${MINIO_ROOT_USER}
          -Dfs.s3a.secret.key=${MINIO_ROOT_PASSWORD}
          -Dfs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
          -Dorg.apache.hadoop.fs.s3a=DEBUG
          -Dsoftware.amazon.awssdk=DEBUG
          -DHADOOP_ROOT_LOGGER=DEBUG,console
    ports:
      - "9083:9083"
    networks:
      - default
      - spark-network
    volumes:
      - ./conf/hive-site.xml.template:/opt/hive/conf/hive-site.xml.template:ro
      - ./conf/hive-site.xml:/opt/hive/conf/hive-site.xml:ro


# ---------------------------------------------------------
  # Spark Master
  # ---------------------------------------------------------
  spark-master:
    <<: *spark-common # Injects everything from the template!
    container_name: ${PROJECT_NAME}-spark-master
    environment:
      <<: *spark-common-env # Injects the common environment variables!
      SPARK_MASTER_HOST: spark-master
      SPARK_DRIVER_MEMORY: ${SPARK_DRIVER_MEMORY:-2g}
    command: [
      "/opt/spark/bin/spark-class",
      "org.apache.spark.deploy.master.Master",
      "--host", "spark-master",
      "--port", "7077",
      "--webui-port", "8080",
    ]
    ports:
      - "8080:8080"   # Master UI
      - "7077:7077"   # RPC Port
      - "4040:4040"   # App UI

  # ---------------------------------------------------------
  # Spark Worker
  # ---------------------------------------------------------
  spark-worker:
    <<: *spark-common
    container_name: ${PROJECT_NAME}-spark-worker-1
    depends_on:
      - spark-master
    environment:
      <<: *spark-common-env
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES:-1}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY:-2g}
    command: [
      "/opt/spark/bin/spark-class",
      "org.apache.spark.deploy.worker.Worker",
      "--webui-port", "8081",
      "spark://spark-master:7077"
    ]

  # ---------------------------------------------------------
  # Spark History Server
  # ---------------------------------------------------------
  spark-history-server:
    <<: *spark-common
    container_name: ${PROJECT_NAME}-spark-history
    # Run as root if you need to create folders in /opt/spark
    user: "0" 
    environment:
      <<: *spark-common-env
      # This tells the Apache entrypoint to start the History Server
      SPARK_NO_DAEMONIZE: "true"
    # The official image entrypoint will handle the rest if you pass the class
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.history.HistoryServer
    ports:
      - "18080:18080"

  spark-thrift-server:
    <<: *spark-common
    container_name: ${PROJECT_NAME}-spark-thrift
    environment:
      <<: *spark-common-env
    command: [
      "/opt/spark/bin/spark-submit",
      "--class", "org.apache.spark.sql.hive.thriftserver.HiveThriftServer2",
      "--master", "spark://spark-master:7077",
      "--conf", "spark.sql.hive.thriftServer.singleSession=true",
      "--conf", "spark.hadoop.hive.metastore.uris=thrift://hive-metastore:9083",
      "--conf", "spark.sql.warehouse.dir=s3a://data/",
      "--conf", "spark.hadoop.hive.metastore.warehouse.dir=s3a://data/",
      "--conf", "spark.cores.max=2",
      "--conf", "spark.executor.memory=2g",
      "--hiveconf", "hive.server2.thrift.bind.host=0.0.0.0",
      "--hiveconf", "hive.server2.authentication=NOSASL",
      "spark-internal"
    ]
    depends_on:
      - spark-master
      - hive-metastore
    ports:
      - "10000:10000" # Thrift Server Port  
      - "4041:4040"
    networks:
      - default
      - spark-network

  trino:
    image: trinodb/trino:latest
    container_name: ${PROJECT_NAME}-trino
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - ./conf/trino/etc/config.properties:/usr/lib/trino/etc/config.properties:ro
      - ./conf/trino/catalog/delta.properties:/etc/trino/catalog/delta.properties
    networks:
      - default


  # -----------------------------
  # Postgres (for Hive + Airflow)
  # -----------------------------
  postgres:
    image: postgres:15
    container_name: ${PROJECT_NAME}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "15432:5432"
    volumes:
      - postgres-data-v2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_DB_USER} -d ${POSTGRES_DB_NAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default
      - spark-network

  create-dbs:
    env_file:
    - .env
    build:
      context: .
      dockerfile: create_dbs.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    networks:      # <--- Add this just to be safe and explicit
      - default

  airflow-apiserver:
    <<: *airflow-common
    container_name: ${PROJECT_NAME}-airflow-apiserver
    command: api-server
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-spark
    container_name: ${PROJECT_NAME}-airflow-scheduler
    command: scheduler
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    container_name: ${PROJECT_NAME}-airflow-dag-processor
    <<: *airflow-common
    command: dag-processor
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    container_name: ${PROJECT_NAME}-airflow-init
    <<: *airflow-common
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    command: >
      bash -c "
        airflow db migrate
      "

  # airflow-cli:
  #   container_name: ${PROJECT_NAME}-airflow-cli
  #   <<: *airflow-common
  #   command: bash -c "airflow"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy


  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully


volumes:
  postgres-data-v2:
  minio-data:
  spark-events:

networks:
  spark-network:
    external: true